<!-- Particle Field -->
<div class="particle-field" id="registerParticles"></div>

<!-- Orbital rings decoration -->
<div class="orbit-ring orbit-ring--1"></div>
<div class="orbit-ring orbit-ring--2"></div>
<div class="orbit-ring orbit-ring--3"></div>

<div class="auth-scene">
  <div class="accent-node accent-node--tl"></div>
  <div class="accent-node accent-node--br"></div>

  <div class="auth-pod">

    <!-- Brand -->
    <div class="auth-brand">
      <div class="brand-node">
        <div class="brand-node__core"></div>
        <div class="brand-node__ring"></div>
        <div class="brand-node__ring brand-node__ring--2"></div>
      </div>
      <h1 class="brand-title">BLOOM<span>NODES</span></h1>
    </div>

    <h2 class="auth-heading">Grow your Node</h2>
    <p class="auth-subheading">Plant a new identity in the network</p>

    <!-- Username -->
    <div class="field-vine">
      <label class="vine-label">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        Username
      </label>
      <div class="vine-input-wrap">
        <input class="vine-input" type="text" [(ngModel)]="username" placeholder="your_username" autocomplete="username" />
        <span class="vine-glow"></span>
      </div>
    </div>

    <!-- Email -->
    <div class="field-vine">
      <label class="vine-label">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
        Email
      </label>
      <div class="vine-input-wrap">
        <input class="vine-input" type="email" [(ngModel)]="email" placeholder="you@cosmos.dev" autocomplete="email" />
        <span class="vine-glow"></span>
      </div>
    </div>

    <!-- Password -->
    <div class="field-vine">
      <label class="vine-label">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        Password
      </label>
      <div class="vine-input-wrap">
        <input class="vine-input" type="password" [(ngModel)]="password" placeholder="••••••••" autocomplete="new-password" (keyup.enter)="register()" />
        <span class="vine-glow"></span>
      </div>
    </div>

    <!-- Error -->
    @if (errorMessage) {
      <div class="auth-error">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ errorMessage }}
      </div>
    }

    <!-- Register Button -->
    <button class="bloom-btn bloom-btn--register" (click)="register()">
      <span class="bloom-btn__text">Sprout Node</span>
      <span class="bloom-btn__ripple"></span>
      <svg class="bloom-btn__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 5v14M5 12l7 7 7-7"/>
      </svg>
    </button>

    <!-- Divider vine -->
    <div class="vine-divider">
      <span class="vine-divider__line"></span>
      <span class="vine-divider__node"></span>
      <span class="vine-divider__line"></span>
    </div>

    <!-- Login link -->
    <p class="auth-link">
      Already in the network?
      <a routerLink="/login" class="vine-link">
        Bloom back in
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </a>
    </p>

  </div>
</div>
