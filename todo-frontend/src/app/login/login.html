<!-- Particle Field -->
<div class="particle-field" id="loginParticles"></div>

<!-- Orbital rings decoration -->
<div class="orbit-ring orbit-ring--1"></div>
<div class="orbit-ring orbit-ring--2"></div>
<div class="orbit-ring orbit-ring--3"></div>

<div class="auth-scene">
  <!-- Node accent decorations -->
  <div class="accent-node accent-node--tl"></div>
  <div class="accent-node accent-node--br"></div>

  <div class="auth-pod">

    <!-- Logo / Brand -->
    <div class="auth-brand">
      <div class="brand-node">
        <div class="brand-node__core"></div>
        <div class="brand-node__ring"></div>
        <div class="brand-node__ring brand-node__ring--2"></div>
      </div>
      <h1 class="brand-title">BLOOM<span>NODES</span></h1>
    </div>

    <h2 class="auth-heading">Access your Network</h2>
    <p class="auth-subheading">Enter your credentials to bloom in</p>

    <!-- Username -->
    <div class="field-vine">
      <label class="vine-label">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        Username
      </label>
      <div class="vine-input-wrap">
        <input
          class="vine-input"
          type="text"
          [(ngModel)]="username"
          placeholder="your_username"
          autocomplete="username"
        />
        <span class="vine-glow"></span>
      </div>
    </div>

    <!-- Password -->
    <div class="field-vine">
      <label class="vine-label">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        Password
      </label>
      <div class="vine-input-wrap">
        <input
          class="vine-input"
          type="password"
          [(ngModel)]="password"
          placeholder="••••••••"
          autocomplete="current-password"
          (keyup.enter)="login()"
        />
        <span class="vine-glow"></span>
      </div>
    </div>

    <!-- Error -->
    <div class="auth-error" *ngIf="errorMessage">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ errorMessage }}
    </div>

    <!-- Login Button -->
    <button class="bloom-btn" (click)="login()">
      <span class="bloom-btn__text">Bloom In</span>
      <span class="bloom-btn__ripple"></span>
      <svg class="bloom-btn__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </button>

    <!-- Divider vine -->
    <div class="vine-divider">
      <span class="vine-divider__line"></span>
      <span class="vine-divider__node"></span>
      <span class="vine-divider__line"></span>
    </div>

    <!-- Register link -->
    <p class="auth-link">
      No node yet?
      <a routerLink="/register" class="vine-link">
        Grow one
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M7 17L17 7M17 7H7M17 7v10"/>
        </svg>
      </a>
    </p>

  </div>
</div>
