<h1>Todo List</h1>

<!-- Form to create new todo -->
<div class="create-form">
  <h2>Add New Todo</h2>
  
  <!-- Title field with error message -->
  <div>
    <label>Title:</label>
    <input 
      type="text" 
      [(ngModel)]="newTodoTitle" 
      placeholder="Enter task title"
      (input)="titleError = ''"
    />
    <span class="error" *ngIf="titleError">{{ titleError }}</span>
  </div>
  
  <!-- Priority field with error message -->
  <div>
    <label>Priority:</label>
    <select [(ngModel)]="newTodoPriority" (change)="priorityError = ''">
      <option value="low">Low</option>
      <option value="medium">Medium</option>
      <option value="high">High</option>
    </select>
    <span class="error" *ngIf="priorityError">{{ priorityError }}</span>
  </div>
  
  <button (click)="createTodo()" [disabled]="isLoading">Add Todo</button>
</div>
<hr />

<!-- Loading indicator -->
<div *ngIf="isLoading" class="spinner-container">
  <div class="spinner"></div>
  <p>Loading todos...</p>
</div>

<!-- No todos message -->

<div *ngIf="!isLoading && todos().length === 0">
  <p>No todos yet. Create one using the form above!</p>
</div>


<!-- Filter Section -->
<div class="filter-section">
  <label>Filter by priority:</label>
  <select [value]="filterPriority" (change)="changeFilter($any($event.target).value)">
    <option value="all">All</option>
    <option value="low">Low</option>
    <option value="medium">Medium</option>
    <option value="high">High</option>
  </select>
</div>

<!-- Todo list -->
<ul *ngIf="!isLoading && filteredTodos().length > 0">
  <li *ngFor="let todo of filteredTodos()">
    <strong>{{ todo.title }}</strong> - {{ todo.priority }}
    <span *ngIf="todo.completed"> ✅ COMPLETED</span>
    
    <!-- Edit button -->
    <button (click)="startEdit(todo)">Edit</button>
    <button *ngIf="!todo.completed" (click)="completeTodo(todo.id)">Complete</button>
    <button class="delete" (click)="deleteTodo(todo.id)">Delete</button>
  </li>

  <!-- Edit Todo Form (shows only when editing) -->
  <div *ngIf="editingTodo" class="edit-form">
    <h3>Edit Todo</h3>
    <div>
      <label>Title:</label>
      <input [(ngModel)]="editingTodo.title" />
    </div>
    <div>
      <label>Priority:</label>
      <select [(ngModel)]="editingTodo.priority">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>
    </div>
    <button (click)="updateTodo()">Save</button>
    <button (click)="cancelEdit()">Cancel</button>
  </div>
</ul>

<div *ngIf="!isLoading && filteredTodos().length === 0 && todos().length > 0">
  <p>No todos with priority "{{ filterPriority }}"</p>
</div>
